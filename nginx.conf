# nginx server for the Glassbox static bundle (see Dockerfile). Replaces the
# stock default.conf. Glassbox routes entirely on the client via a `?lesson=`
# query on "/", so there are no server-side routes — but we still send unknown
# paths to index.html so a stray deep link or refresh never 404s.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text payloads (the JS/CSS bundle is the bulk of the transfer).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Content-hashed, immutable build assets — cache hard and skip access logs.
    # One explicit Cache-Control (not `expires`, which would emit a second one).
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The HTML entry references the latest hashed assets, so it must never be
    # cached — otherwise a stale index.html points at assets that no longer exist.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: serve the file if it exists, else hand back the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Liveness/readiness target for the k8s probes (hit on the pod, not exposed
    # through the public Ingress).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
