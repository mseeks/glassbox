<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gl-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b7fc4" stop-opacity="0.82" />
      <stop offset="1" stop-color="#1ba898" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="gl-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c6bd8" stop-opacity="0.42" />
      <stop offset="1" stop-color="#5b7fc4" stop-opacity="0.16" />
    </linearGradient>
    <linearGradient id="gl-right" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1ba898" stop-opacity="0.48" />
      <stop offset="1" stop-color="#e06a85" stop-opacity="0.16" />
    </linearGradient>
    <radialGradient id="gl-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0d7d72" stop-opacity="0.92" />
      <stop offset="0.5" stop-color="#2f9e93" stop-opacity="0.42" />
      <stop offset="1" stop-color="#2f9e93" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#efe7d4" />
  <!-- isometric glass cube: tinted faces, dark ink edges, a teal-lit core -->
  <g stroke="#33302a" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="16,5 27,11 16,17 5,11" fill="url(#gl-top)" stroke-opacity="0.9" stroke-width="1.1" />
    <polygon points="5,11 16,17 16,28 5,22" fill="url(#gl-left)" stroke-opacity="0.55" stroke-width="1.1" />
    <polygon points="16,17 27,11 27,22 16,28" fill="url(#gl-right)" stroke-opacity="0.55" stroke-width="1.1" />
  </g>
  <circle cx="16" cy="16" r="7" fill="url(#gl-core)" />
  <circle cx="16" cy="16" r="1.7" fill="#0a3d38" />
</svg>
