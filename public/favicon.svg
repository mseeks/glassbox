<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gb-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9ab8e8" stop-opacity="0.55" />
      <stop offset="1" stop-color="#5eead4" stop-opacity="0.22" />
    </linearGradient>
    <linearGradient id="gb-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4b5fd" stop-opacity="0.20" />
      <stop offset="1" stop-color="#9ab8e8" stop-opacity="0.06" />
    </linearGradient>
    <linearGradient id="gb-right" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.22" />
      <stop offset="1" stop-color="#fda4af" stop-opacity="0.06" />
    </linearGradient>
    <radialGradient id="gb-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fdf6e3" stop-opacity="0.95" />
      <stop offset="0.5" stop-color="#9ab8e8" stop-opacity="0.7" />
      <stop offset="1" stop-color="#9ab8e8" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0a0f" />
  <!-- isometric glass cube: translucent faces, bright parchment edges, a lit core -->
  <g stroke="#e8dec8" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="16,5 27,11 16,17 5,11" fill="url(#gb-top)" stroke-opacity="0.85" stroke-width="1.1" />
    <polygon points="5,11 16,17 16,28 5,22" fill="url(#gb-left)" stroke-opacity="0.5" stroke-width="1.1" />
    <polygon points="16,17 27,11 27,22 16,28" fill="url(#gb-right)" stroke-opacity="0.5" stroke-width="1.1" />
  </g>
  <circle cx="16" cy="16" r="7" fill="url(#gb-core)" />
  <circle cx="16" cy="16" r="1.7" fill="#fdf6e3" />
</svg>
