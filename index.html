<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Glassbox: the black box, made of glass. A small library of interactive systems lessons you can poke, prod, and see straight through."
    />
    <meta name="theme-color" content="#0a0a0f" />
    <!-- The tab icon has a light twin; the pre-paint script below points this at
         the right one. Declared before that script so it exists when it runs. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Pre-paint theme resolution: set <html data-theme> from the stored
         preference (+ the OS for 'system') BEFORE first paint so there is no
         light/dark flash. This mirrors resolveTheme() in src/shared/theme.js;
         src/shared/useTheme.js owns every change after hydration. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('glassbox-theme');
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system') pref = 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              typeof window.matchMedia === 'function' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          var theme = dark ? 'dark' : 'light';
          var root = document.documentElement;
          root.setAttribute('data-theme', theme);
          root.style.colorScheme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#0a0a0f' : '#f4efe4');
          var icon = document.querySelector('link[rel="icon"]');
          if (icon) icon.setAttribute('href', dark ? '/favicon.svg' : '/favicon-light.svg');
        } catch (e) {
          /* storage/matchMedia blocked → leave the dark default in place */
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- JetBrains Mono is the shared family-glue monospace (--font-mono), used by
         the shell and every lesson for numerics/credits/eyebrows. Loaded once here
         (full italic + weight axis) instead of redundantly re-@imported per lesson. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300..800;1,300..800&display=swap"
    />
    <title>Glassbox</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
